name: Build angular

on:
  push:
    branches: [ "main" ]


jobs:
  build-angular:
    runs-on: ubuntu-latest
    steps:
     -  uses: actions/checkout@v6

     - name: Setup node js
       uses: actions/setup-node@v6
       with:
         node-version: 22.x

     - name: Install dependencies
       run: npm install
      
     - name: Build
       run: npm run build
