<p highlight>{{'products works!' | upperCase}}</p>
<table>
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Price</th>
    <th>Quantity</th>
  </tr>

  <tr *ngFor="let p of products()">
    <td>{{p.id}}</td>
    <td>{{p.name}}</td>
    <td>{{p.price}}</td>
    <td>{{p.stock}}</td>
    <td>{{p.imageUrl}}</td>
    <td>{{p.createdAt}}</td>
  </tr>
</table>
